<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AquaClean Luxe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

<div class="auth-wrapper">
    <!-- Background particles -->
    <div class="bg-particles">
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
    </div>

    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fas fa-soap"></i> AquaClean Luxe
            </div>
            <p class="auth-subtitle">Premium Laundry Management Portal</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger" style="margin-bottom: 20px; padding: 12px 16px;">
            <i class="fas fa-exclamation-triangle"></i>
            <span>Invalid email or password.</span>
        </div>
        <div th:if="${param.logout}" class="alert alert-success" style="margin-bottom: 20px; padding: 12px 16px;">
            <i class="fas fa-check-circle"></i>
            <span>Logged out successfully.</span>
        </div>
        <div th:if="${param.registered}" class="alert alert-success" style="margin-bottom: 20px; padding: 12px 16px;">
            <i class="fas fa-check-circle"></i>
            <span>Registered successfully! Please login.</span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="name@domain.com" required autofocus>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 8px; margin: 20px 0;">
                <input type="checkbox" id="remember-me" name="remember-me" style="cursor: pointer; width: 16px; height: 16px; accent-color: var(--neon-cyan);">
                <label for="remember-me" class="form-label" style="margin-bottom: 0; cursor: pointer; font-weight: 500;">Remember me</label>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div style="text-align: center; margin-top: 25px; font-size: 14px; color: var(--text-muted);">
            Don't have an account?
            <a th:href="@{/register}" style="color: var(--neon-cyan); font-weight: 600; text-decoration: none; transition: all 0.2s ease;"
               onmouseover="this.style.textShadow='0 0 10px rgba(0,240,255,0.5)'"
               onmouseout="this.style.textShadow='none'">Register here</a>
        </div>
    </div>
</div>

</body>
</html>
