<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - AquaClean Luxe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

<div class="auth-wrapper">
    <div class="bg-particles">
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
    </div>

    <div class="auth-card" style="text-align: center;">
        <div style="margin: 0 auto 20px auto; width: 80px; height: 80px; border-radius: 50%;
                    background: var(--neon-rose-dim); color: var(--neon-rose);
                    display: flex; align-items: center; justify-content: center; font-size: 36px;
                    box-shadow: 0 0 30px rgba(239,68,68,0.2);">
            <i class="fas fa-ban"></i>
        </div>

        <h1 style="font-size: 32px; font-weight: 800; color: var(--text-primary); margin-bottom: 10px;">403 — Forbidden</h1>
        <p style="color: var(--text-muted); font-size: 16px; line-height: 1.6; margin-bottom: 30px;">
            You do not have permission to access this page.<br>
            This resource is reserved for authorized portal roles.
        </p>

        <a th:href="@{/dashboard}" class="btn btn-primary btn-block">
            <i class="fas fa-arrow-left"></i> Return to Dashboard
        </a>
    </div>
</div>

</body>
</html>
