<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: html_head('Admin Dashboard', ~{})}"></head>
<body>

<div th:replace="~{fragments/layout :: app_layout(~{::#admin-content}, 'Admin Dashboard')}">
    <div id="admin-content">

        <!-- KPI Metrics Grid -->
        <div class="stat-grid">
            <a href="/admin/orders" class="stat-card stat-card-link">
                <div>
                    <div class="stat-label">Total Orders</div>
                    <div class="stat-value" th:text="${totalOrders}">150</div>
                </div>
                <div class="stat-icon stat-blue">
                    <i class="fas fa-shopping-basket"></i>
                </div>
            </a>

            <a href="/admin/reports" class="stat-card stat-card-link">
                <div>
                    <div class="stat-label">Total Revenue</div>
                    <div class="stat-value" th:text="'₹' + ${#numbers.formatDecimal(totalRevenue, 1, 'COMMA', 2, 'POINT')}">₹12,450.00</div>
                </div>
                <div class="stat-icon stat-green">
                    <i class="fas fa-indian-rupee-sign"></i>
                </div>
            </a>

            <a href="/admin/orders" class="stat-card stat-card-link">
                <div>
                    <div class="stat-label">Pending Deliveries</div>
                    <div class="stat-value" th:text="${pendingDeliveries}">12</div>
                </div>
                <div class="stat-icon stat-amber">
                    <i class="fas fa-truck-ramp-box"></i>
                </div>
            </a>

            <a href="/admin/orders" class="stat-card stat-card-link">
                <div>
                    <div class="stat-label">Active Customers</div>
                    <div class="stat-value" th:text="${activeCustomers}">84</div>
                </div>
                <div class="stat-icon stat-purple">
                    <i class="fas fa-users"></i>
                </div>
            </a>
        </div>

        <!-- Analytics & Chart Section -->
        <div class="grid-2col" style="margin-bottom: 30px;">
            <div class="card-panel">
                <h3 class="fade-in-up" style="font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 20px;">
                    <i class="fas fa-chart-line" style="color: var(--neon-cyan); margin-right: 8px;"></i> Monthly Revenue Trend
                </h3>
                <div style="height: 300px; position: relative;">
                    <canvas id="adminRevenueChart"></canvas>
                </div>
            </div>

            <div class="card-panel">
                <h3 class="fade-in-up" style="font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 20px;">
                    <i class="fas fa-chart-pie" style="color: var(--neon-purple); margin-right: 8px;"></i> Service Popularity
                </h3>
                <div style="height: 300px; position: relative;">
                    <canvas id="adminServiceChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Recent Orders Table -->
        <div class="table-container fade-in-up">
            <div class="table-header">
                <span class="table-title">
                    <i class="fas fa-clock-rotate-left" style="color: var(--neon-cyan); margin-right: 8px;"></i> Recent Orders
                </span>
                <a th:href="@{/admin/orders}" class="btn btn-secondary" style="padding: 6px 12px; font-size: 13px;">View All</a>
            </div>

            <table class="custom-table">
                <thead>
                    <tr>
                        <th>Order No</th>
                        <th>Customer</th>
                        <th>Status</th>
                        <th>Total Amount</th>
                        <th>Created Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${recentOrders}">
                        <td th:text="${order.orderNumber}" style="font-weight: 700;">ORD-10023</td>
                        <td th:text="${order.customer.user.fullName}">Jane Doe</td>
                        <td>
                            <span th:class="'badge badge-' + ${#strings.toLowerCase(order.status)}" th:text="${order.status}">PENDING</span>
                        </td>
                        <td th:text="'₹' + ${#numbers.formatDecimal(order.finalAmount, 1, 'COMMA', 2, 'POINT')}">₹450.00</td>
                        <td th:text="${#temporals.format(order.createdDate, 'dd-MM-yyyy HH:mm')}">25-05-2026 14:20</td>
                        <td>
                            <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-secondary" style="padding: 4px 8px; font-size: 12px;">
                                <i class="fas fa-eye"></i> Details
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(recentOrders)}">
                        <td colspan="6" class="empty-state">
                            <i class="fas fa-folder-open"></i>
                            No orders placed yet.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener('DOMContentLoaded', () => {
        initDashboardChart('adminRevenueChart', 'line',
            ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
            [3000, 4500, 5200, 7800, 12450],
            'Revenue (₹)'
        );

        initDashboardChart('adminServiceChart', 'doughnut',
            ['Wash & Fold', 'Ironing', 'Dry Clean', 'Premium care'],
            [40, 25, 20, 15],
            'Service Share',
            {
                bg: ['rgba(0,240,255,0.3)', 'rgba(168,85,247,0.3)', 'rgba(16,185,129,0.3)', 'rgba(245,158,11,0.3)'],
                border: ['#00f0ff', '#a855f7', '#10b981', '#f59e0b']
            }
        );
    });
    /*]]>*/
</script>

<!-- Chart.js loaded by layout.html -->

</body>
</html>
